name: Sync And Build
permissions: write-all
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
jobs:
  # Cheap, no-checkout check that runs every schedule tick. Only API calls to look at closed
  # PR numbers -- no full clone, no submodules. The expensive sync job below only runs at all if
  # this finds something new, instead of checking out the whole repo just to bail out.
  check:
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.latest.outputs.pr_number }}
      should_run: ${{ steps.check.outputs.should_run }}

    steps:
      - name: Determine latest upstream closed PR
        id: latest
        run: |
          # Fetch the most recently closed Pull Request from the upstream repository using GitHub API
          LATEST_PR=$(curl -s "https://api.github.com/repos/dolphin-emu/dolphin/pulls?state=closed&per_page=1" \
            | jq -r '.[0].number')
          
          if [ -z "$LATEST_PR" ] || [ "$LATEST_PR" = "null" ]; then
            echo "No closed PRs found on upstream"
            exit 1
          fi
          echo "pr_number=$LATEST_PR" >> "$GITHUB_OUTPUT"
          echo "Latest upstream closed PR number: $LATEST_PR"

      - name: Check if already synced
        id: check
        run: |
          if git ls-remote --exit-code --tags "https://github.com/${{ github.repository }}.git" \
              "refs/tags/sync/pr-${{ steps.latest.outputs.pr_number }}" >/dev/null 2>&1; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "PR #${{ steps.latest.outputs.pr_number }} already synced, nothing to do"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "PR #${{ steps.latest.outputs.pr_number }} is new, running full sync"
          fi

  sync:
    needs: check
    if: needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          submodules: recursive

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream PR branch
        run: |
          git remote add upstream https://github.com/dolphin-emu/dolphin.git
          # Fetch the specific closed PR's head branch references so we can merge it
          git fetch upstream "pull/${{ needs.check.outputs.pr_number }}/head:upstream-pr-${{ needs.check.outputs.pr_number }}" --quiet

      # release-sync is rebuilt from the tip of master on every run, so
      # this automation never pushes to (or conflicts with) the branch used for manual testing.
      - name: Create release-sync branch from latest feature work
        run: git checkout -B release-sync master

      - name: Merge upstream PR branch
        id: merge
        run: |
          set +e
          git merge "upstream-pr-${{ needs.check.outputs.pr_number }}" --no-edit -m "Merge upstream PR #${{ needs.check.outputs.pr_number }}"
          status=$?
          set -e
          if [ $status -ne 0 ]; then
            git merge --abort || true
            echo "conflict=true" >> "$GITHUB_OUTPUT"
          else
            echo "conflict=false" >> "$GITHUB_OUTPUT"
          fi

      # No GitHub Issue is filed here (Issues are disabled on this repo) -- failing the job
      # outright is enough. GitHub automatically emails repo admins when a *scheduled* workflow
      # run fails, and the run shows up red in the Actions tab either way.
      - name: Report merge conflict
        if: steps.merge.outputs.conflict == 'true'
        run: |
          echo "Automatic merge of upstream PR '#${{ needs.check.outputs.pr_number }}' into release-sync (based on master) produced conflicts."
          echo "Resolve manually:"
          echo "  git fetch upstream pull/${{ needs.check.outputs.pr_number }}/head"
          echo "  git checkout -B release-sync master"
          echo "  git merge FETCH_HEAD"
          exit 1

      - name: Update submodules
        if: steps.merge.outputs.conflict == 'false'
        run: git submodule update --init --recursive

      - name: Push release-sync branch
        if: steps.merge.outputs.conflict == 'false'
        run: git push origin release-sync --force

      - name: Set up JDK 17
        if: steps.merge.outputs.conflict == 'false'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        if: steps.merge.outputs.conflict == 'false'
        uses: android-actions/setup-android@v3

      - name: Install NDK
        if: steps.merge.outputs.conflict == 'false'
        run: sdkmanager "ndk;29.0.14206865"

      - name: Cache CMake build output
        if: steps.merge.outputs.conflict == 'false'
        uses: actions/cache@v4
        with:
          path: Source/Android/.cxx
          key: cxx-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'Source/Core/**/*.cpp', 'Source/Core/**/*.h') }}
          restore-keys: cxx-${{ runner.os }}-

      - name: Decode release keystore
        if: steps.merge.outputs.conflict == 'false'
        run: echo "${{ secrets.KEYSTORE_P12 }}" | base64 -d > "$RUNNER_TEMP/dolphincs-release.p12"

      - name: Build release APK
        if: steps.merge.outputs.conflict == 'false'
        working-directory: Source/Android
        run: |
          ./gradlew assembleRelease --no-daemon \
            -Pkeystore="$RUNNER_TEMP/dolphincs-release.p12" \
            -Pstorepass="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pkeyalias="${{ secrets.KEYSTORE_ALIAS }}" \
            -Pkeypass="${{ secrets.KEYSTORE_PASSWORD }}"
          mv app/build/outputs/apk/release/app-release.apk ../../dolphincs-gfp-vpr-${{ needs.check.outputs.pr_number }}-all.apk
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/29.0.14206865

      - name: Remove decoded keystore
        if: always()
        run: rm -f "$RUNNER_TEMP/dolphincs-release.p12"
      - name: Get Next Version Code
        if: steps.merge.outputs.conflict == 'false'
        id: version
        run: |
          set -euo pipefail
          YEAR=$(date -u +"%y")
          TAG=$( { gh release list -R sharath-5br2r/patched-apks-builder-2nd --exclude-drafts -L 100 2>/dev/null || true; } | awk -F '\t' -v year="$YEAR" '$3 ~ "^" year "[0-9][0-9][0-9][0-9]$" {print $3}' | sort -nr | head -n1 )
          if [ -n "$TAG" ]; then
              BUILD_COUNT=${TAG:2:4}
              BUILD_COUNT=$((10#$BUILD_COUNT + 1))
          else
              BUILD_COUNT=1
          fi

          NEXT_VER_CODE=$(printf "%s%04d" "$YEAR" "$BUILD_COUNT")
          if [ -n "${GITHUB_OUTPUT:-}" ]; then
              echo "NEXT_VER_CODE=$NEXT_VER_CODE" >> "$GITHUB_OUTPUT"
          else
              export NEXT_VER_CODE="$NEXT_VER_CODE"
          fi
      - name: Publish release
        if: steps.merge.outputs.conflict == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.NEXT_VER_CODE }}
          name: Build No. ${{ steps.version.outputs.NEXT_VER_CODE }} (from upstream PR #${{ needs.check.outputs.pr_number }})
          target_commitish: release-sync
          prerelease: true
          repository: sharath-5br2r/patched-apks-builder-2nd
          make_latest: true
          files: |
              ./*.apk
          body: |
            Built from upstream Dolphin closed PR `#${{ needs.check.outputs.pr_number }}`, merged with the
            custom user data storage location feature (Scoped Storage / Internal Storage / SD Card).

            This is an unofficial community build, not affiliated with the Dolphin team.
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Tag sync marker
        if: steps.merge.outputs.conflict == 'false'
        run: |
          git tag "sync/pr-${{ needs.check.outputs.pr_number }}"
          git push origin "sync/pr-${{ needs.check.outputs.pr_number }}"

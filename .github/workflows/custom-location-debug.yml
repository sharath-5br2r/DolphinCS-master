name: Custom Location Debug Build

on:
  push:
    branches:
      - custom-location
    paths:
      - 'Source/**'
      - '.github/workflows/custom-location-debug.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;29.0.14206865"

      - name: Cache CMake build output
        uses: actions/cache@v4
        with:
          path: Source/Android/.cxx
          key: cxx-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'Source/Core/**/*.cpp', 'Source/Core/**/*.h') }}
          restore-keys: cxx-${{ runner.os }}-

      - name: Build debug APK
        working-directory: Source/Android
        run: ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/29.0.14206865

      - name: Delete existing pre-release
        run: gh release delete custom-location-preview --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: custom-location-preview
          name: "Custom Location - Debug Preview"
          prerelease: true
          make_latest: false
          files: Source/Android/app/build/outputs/apk/debug/app-debug.apk
          body: |
            **Debug build for testing an in-progress feature — not for general use.**

            Branch: `custom-location`
            Commit: ${{ github.sha }}

            ### What's in this build
            Adds a "Custom Location…" option to User Data Storage Location, letting you pick any
            folder (internal storage or SD card) via the system folder picker, with full migration
            support (including moving between two different custom locations) and byte-verified
            copy/delete.

            This is a work-in-progress feature branch, not yet merged into the main DolphinCS
            branch. Expect bugs; please report anything odd.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
